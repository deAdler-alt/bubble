# Nginx config dla containera `client`.
# Serwuje statyki Vite + proxy /api → service `server:3001`.

server {
  listen      80;
  server_name _;

  root  /usr/share/nginx/html;
  index index.html;

  # ── Compression ──────────────────────────────
  gzip            on;
  gzip_types      text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # ── /api → backend ───────────────────────────
  # Nazwa "server" = service w docker-compose.yml
  location /api/ {
    proxy_pass         http://server:3001;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;

    # Multipart audio upload (do 5 MB w backendzie + bufor).
    client_max_body_size      10m;
    proxy_request_buffering   off;
    proxy_read_timeout        60s;
    proxy_send_timeout        60s;
  }

  # ── Cache hashed assets (Vite emituje *-[hash].{js,css}) ──
  location /assets/ {
    expires    1y;
    add_header Cache-Control "public, immutable";
    try_files  $uri =404;
  }

  # ── SPA fallback ─────────────────────────────
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Wyklucz dotfiles
  location ~ /\. {
    deny all;
    return 404;
  }
}
