name: baibel

services:
  # ── Backend Fastify (Groq Whisper + Llama + sample bank) ──
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    image: baibel-server:latest
    container_name: baibel-server
    restart: unless-stopped
    # ENV lokalnie: server/.env (nie commitowany).
    # W Ubuntu prod: skopiuj plik tam, lub ustaw env w compose.override.yml.
    env_file:
      - ./server/.env
    environment:
      PORT: "3001"
      HOST: "0.0.0.0"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_PRETTY: ${LOG_PRETTY:-0}
    expose:
      - "3001"
    networks:
      - baibel-net
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:3001/api/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Frontend (nginx + SPA) ──
  client:
    build:
      context: .
      dockerfile: Dockerfile
    image: baibel-client:latest
    container_name: baibel-client
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "${PUBLIC_PORT:-8080}:80"
    networks:
      - baibel-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  baibel-net:
    driver: bridge
